# auto-dev-agentos — Auditor Mode Configuration
# Systematic workflow: standards → scan → findings → verify → report
description=Systematic codebase audit workflow (standards → scan → findings → report)
entry_file=standards.md
state_file=findings.json
pending_query=[.findings[] | select(.status == "pending" or .status == "in_progress")] | length
progress_query=[.findings[] | select(.status == "verified" or .status == "dismissed")] | length
phase_init=scanner
phase_work=auditor
phase_review=reporter
phase_orient=strategist
claude_md=CLAUDE.md
verify_command=python3 -c "import json,sys;d=json.load(open('.state/findings.json'));t=len(d.get('findings',[]));v=len([f for f in d.get('findings',[]) if f.get('status') in ('verified','dismissed')]);print(f'[Metric] Coverage: {v}/{t}')" 2>/dev/null || true
