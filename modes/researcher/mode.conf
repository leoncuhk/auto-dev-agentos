# auto-dev-agentos — Researcher Mode Configuration
# Inductive workflow: hypothesis → experiment → evaluate → learn → iterate
description=Inductive research workflow (hypothesis → experiment → evaluate → learn)
entry_file=hypothesis.md
state_file=journal.json
pending_query=[.experiments[] | select(.status == "pending" or .status == "planned" or .status == "running")] | length
progress_query=[.experiments[] | select(.status == "accepted" or .status == "rejected" or .status == "error")] | length
phase_init=theorizer
phase_work=executor
phase_review=analyst
phase_orient=strategist
claude_md=CLAUDE.md
verify_command=python3 run_backtest.py 2>/dev/null || python run_backtest.py
hidden_verify_command=python3 run_backtest.py --split test 2>/dev/null || python run_backtest.py --split test
metric_pattern=[Metric] Sharpe Ratio:
