# Qlib configuration — modified by the loop's researcher mode
# The LLM modifies this file to propose new experiments

model:
  class: LGBModel
  module_path: qlib.contrib.model.gbdt
  kwargs:
    loss: mse
    colsample_bytree: 0.8879
    learning_rate: 0.0421
    subsample: 0.8789
    lambda_l1: 205.7
    lambda_l2: 581.0
    max_depth: 8
    num_leaves: 210
    num_threads: 4

dataset:
  class: DatasetH
  module_path: qlib.data.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: qlib.contrib.data.handler
      kwargs:
        start_time: "2018-01-01"
        end_time: "2023-12-31"
        fit_start_time: "2018-01-01"
        fit_end_time: "2021-12-31"
        instruments: csi300
    segments:
      train: ["2018-01-01", "2021-12-31"]
      valid: ["2022-01-01", "2022-12-31"]
      test: ["2023-01-01", "2023-12-31"]

strategy:
  topk: 30
  n_drop: 5
